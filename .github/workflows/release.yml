name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: cbox-x86_64-linux.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: cbox-aarch64-linux.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: cbox-x86_64-macos.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: cbox-aarch64-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cbox dist/
          cd dist
          tar czf ../${{ matrix.archive }} cbox

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_MACOS=$(sha256sum artifacts/cbox-aarch64-macos.tar.gz | cut -d' ' -f1)
          SHA_X86_64_MACOS=$(sha256sum artifacts/cbox-x86_64-macos.tar.gz | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(sha256sum artifacts/cbox-aarch64-linux.tar.gz | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(sha256sum artifacts/cbox-x86_64-linux.tar.gz | cut -d' ' -f1)

          cat > Formula/cbox.rb << FORMULA
          class Cbox < Formula
            desc "OS-level sandboxing for AI agents and arbitrary commands"
            homepage "https://github.com/borngraced/cbox"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/borngraced/cbox/releases/download/v#{version}/cbox-aarch64-macos.tar.gz"
                sha256 "${SHA_AARCH64_MACOS}"
              else
                url "https://github.com/borngraced/cbox/releases/download/v#{version}/cbox-x86_64-macos.tar.gz"
                sha256 "${SHA_X86_64_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/borngraced/cbox/releases/download/v#{version}/cbox-aarch64-linux.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "https://github.com/borngraced/cbox/releases/download/v#{version}/cbox-x86_64-linux.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "cbox"
            end

            test do
              assert_match "cbox", shell_output("#{bin}/cbox --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/cbox.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cbox.rb
          git commit -m "Update Homebrew formula to v${VERSION}"
          git push origin HEAD:main
